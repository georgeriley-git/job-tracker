<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuclear Jobs Scraper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #eef2f7;
      color: #1e293b;
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #0f2044;
      color: #fff;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 10px rgba(0,0,0,.4);
    }
    .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .01em; }
    .header-meta  { font-size: .78rem; color: #94a3b8; }

    /* ── Layout ── */
    .main { max-width: 860px; margin: 0 auto; padding: 28px 16px 64px; }

    /* ── Day section ── */
    .day { margin-bottom: 36px; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #0f2044;
    }
    .day-name   { font-size: 1rem; font-weight: 700; color: #0f2044; }
    .today-pill {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; background: #059669; color: #fff;
      padding: 2px 7px; border-radius: 4px;
    }
    .day-badge {
      font-size: .72rem; font-weight: 700;
      background: #2563eb; color: #fff;
      padding: 2px 9px; border-radius: 20px;
      margin-left: auto;
    }

    /* ── Company card ── */
    .company {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .company-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      background: #f8fafc;
      border-bottom: 1px solid #f1f5f9;
    }
    .company-name  { font-size: .875rem; font-weight: 600; color: #1e3a8a; }
    .company-count {
      font-size: .7rem; font-weight: 600;
      color: #2563eb; background: #eff6ff;
      padding: 2px 8px; border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Job list ── */
    .job-list { list-style: none; padding: 4px 0; }
    .job-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 16px 7px 28px;
      position: relative;
      border-bottom: 1px solid #f8fafc;
    }
    .job-list li:last-child { border-bottom: none; }
    .job-list li.job-new {
      background: #f0fdf4;
      border-left: 3px solid #22c55e;
    }
    .job-list li::before {
      content: "›";
      position: absolute;
      left: 14px;
      color: #2563eb;
      font-weight: 700;
      font-size: 1.05em;
    }
    .job-title {
      font-size: .86rem;
      color: #374151;
      flex: 1;
      min-width: 0;
    }
    a.job-title {
      color: #1d4ed8;
      text-decoration: none;
    }
    a.job-title:hover {
      text-decoration: underline;
      color: #1e40af;
    }
    .job-loc {
      font-size: .76rem;
      color: #64748b;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Scrape-failure warning ── */
    .scrape-warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-left: 4px solid #ea580c;
      border-radius: 6px;
      padding: 10px 16px;
      margin-bottom: 24px;
      font-size: .82rem;
      color: #7c2d12;
      line-height: 1.5;
    }
    .scrape-warning strong { color: #9f1239; }

    /* ── Empty / loading states ── */
    .empty { text-align: center; padding: 72px 24px; color: #64748b; }
    .empty h2 {
      font-size: 1.05rem; font-weight: 600;
      color: #334155; margin-bottom: 8px;
    }
    .empty p { font-size: .875rem; }
    .empty code {
      background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-size: .85em;
    }
    #loading {
      text-align: center; padding: 72px 24px; color: #64748b; font-size: .9rem;
    }

    /* ── Footer ── */
    .footer { text-align: center; padding: 20px; font-size: .73rem; color: #94a3b8; }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-select {
      flex: 1;
      min-width: 160px;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: .875rem;
      color: #1e293b;
      background: #fff;
      cursor: pointer;
    }
    .run-btn {
      padding: 8px 18px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .run-btn:hover:not(:disabled) { background: #1d4ed8; }
    .run-btn:disabled { background: #94a3b8; cursor: not-allowed; }

    /* ── Progress panel ── */
    .progress-panel {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      padding: 10px 16px;
      margin-bottom: 16px;
      font-size: .84rem;
      color: #1e40af;
      align-items: center;
      gap: 10px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #bfdbfe;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pinned section ── */
    #pinned-section {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #7c3aed;
      border-radius: 8px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .pinned-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: #faf5ff;
      border-bottom: 1px solid #ede9fe;
    }
    .pinned-title {
      font-size: .84rem;
      font-weight: 700;
      color: #5b21b6;
      flex: 1;
    }
    .pinned-badge {
      font-size: .7rem;
      font-weight: 700;
      background: #7c3aed;
      color: #fff;
      padding: 2px 9px;
      border-radius: 20px;
    }
    .pinned-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px 8px 14px;
      border-bottom: 1px solid #f8fafc;
    }
    .pinned-item:last-child { border-bottom: none; }
    .pinned-item.drag-over  { background: #f5f3ff; }
    .pinned-item.dragging   { opacity: .35; }
    .drag-handle {
      color: #d1d5db;
      cursor: grab;
      font-size: .78rem;
      letter-spacing: -1px;
      user-select: none;
      flex-shrink: 0;
      line-height: 1;
    }
    .drag-handle:active { cursor: grabbing; }
    .pinned-info { flex: 1; min-width: 0; }
    .pinned-job-title {
      font-size: .86rem;
      color: #1d4ed8;
      text-decoration: none;
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pinned-job-title:hover { text-decoration: underline; }
    span.pinned-job-title   { color: #374151; }
    .pinned-meta {
      font-size: .72rem;
      color: #64748b;
      margin-top: 2px;
    }
    .unpin-btn {
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .unpin-btn:hover { color: #ef4444; background: #fef2f2; }

    /* ── Pin button on job rows ── */
    .job-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 2px;
      font-size: .8rem;
      line-height: 1;
      opacity: .18;
      transition: opacity .12s;
      flex-shrink: 0;
    }
    .job-list li:hover .pin-btn { opacity: .55; }
    .pin-btn:hover              { opacity: 1 !important; }
    .pin-btn.is-pinned          { opacity: 1; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .header { flex-wrap: wrap; padding: 12px 14px; gap: 6px; }
      .header-meta { font-size: .72rem; }
      .main { padding: 14px 10px 60px; }
      .day-header { flex-wrap: wrap; gap: 6px; }
      .day-badge { margin-left: 0; }
      .job-list li {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        padding: 8px 14px 8px 26px;
      }
      .job-title { word-break: break-word; }
      .job-loc { white-space: normal; }
      .company-head { padding: 9px 12px; }
      .company-name { font-size: .82rem; }
      .controls { gap: 8px; }
      .filter-select { min-width: 0; }
      .pin-btn { opacity: .55; }
      .drag-handle { display: none; }
    }

    /* ── Zero-results collapsible ── */
    .zero-results { margin-bottom: 16px; }
    .zero-results > summary {
      cursor: pointer;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .74rem;
      color: #94a3b8;
      user-select: none;
      padding: 2px 0;
    }
    .zero-results > summary::-webkit-details-marker { display: none; }
    .zero-results > summary::marker { content: none; }
    .zero-results > summary:focus-visible { outline: 1px dotted #cbd5e1; border-radius: 2px; }
    .zr-arrow {
      font-size: .6rem;
      display: inline-block;
      transition: transform .15s;
      color: #cbd5e1;
    }
    .zero-results[open] > summary .zr-arrow { transform: rotate(90deg); }
    .zr-body {
      margin-top: 6px;
      padding: 8px 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
    }
    .zr-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 3px 18px; }
    .zr-list li { font-size: .77rem; }
    .zr-list a { color: #94a3b8; text-decoration: none; }
    .zr-list a:hover { color: #64748b; text-decoration: underline; }
  </style>
</head>
<body>
  <header class="header">
    <span class="header-title">Nuclear Jobs Scraper</span>
    <span id="header-meta" class="header-meta">Loading&hellip;</span>
  </header>
  <main class="main" id="app">
    <p id="loading">Loading snapshot data&hellip;</p>
  </main>
  <footer class="footer" id="footer"></footer>

<script>
(function () {
'use strict';

// ── Helpers ────────────────────────────────────────────────────────────────

var _d = new Date();
var TODAY = _d.getFullYear() + '-' +
    String(_d.getMonth() + 1).padStart(2, '0') + '-' +
    String(_d.getDate()).padStart(2, '0');

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function jobKey(j) {
  return (typeof j === 'string' ? j : (j.title || '')).toLowerCase().trim();
}

function normalise(j) {
  if (typeof j === 'string') return { title: j, url: null, location: null };
  return { title: j.title || '', url: j.url || null, location: j.location || null };
}

// ── Snapshot selection ─────────────────────────────────────────────────────
// Returns names to fetch: last snapshot per date for the 14 most-recent dates,
// plus every snapshot from today (for intraday detection).

function planFetches(allNames) {
  var byDate = {};
  allNames.forEach(function (n) { byDate[n.slice(0, 10)] = n; }); // last per date
  var dates      = Object.keys(byDate).sort();
  var diffDates  = dates.slice(-14);
  var todayNames = allNames.filter(function (n) { return n.slice(0, 10) === TODAY; });

  var toFetch = {};
  diffDates.forEach(function (d) { toFetch[byDate[d]] = true; });
  todayNames.forEach(function (n) { toFetch[n] = true; });

  return {
    names:      Object.keys(toFetch).sort(),
    byDate:     byDate,
    diffDates:  diffDates,
    todayNames: todayNames,
  };
}

// ── Diff logic ─────────────────────────────────────────────────────────────

function dailyNew(snapMap, byDate, diffDates) {
  if (diffDates.length < 2) return [];
  var result = [];
  for (var i = diffDates.length - 1; i > 0; i--) {
    var cur  = snapMap[byDate[diffDates[i]]];
    var prev = snapMap[byDate[diffDates[i - 1]]];
    if (!cur || !prev) continue;

    var newByCompany = {};
    Object.keys(cur).forEach(function (company) {
      var prevKeys = {};
      (prev[company] || []).forEach(function (j) { prevKeys[jobKey(j)] = true; });
      var added = (cur[company] || [])
        .filter(function (j) { return !prevKeys[jobKey(j)]; })
        .map(normalise);
      if (added.length) newByCompany[company] = added;
    });

    if (Object.keys(newByCompany).length)
      result.push({ date: diffDates[i], companies: newByCompany });
  }
  return result;
}

function intradayNew(snapMap, todayNames) {
  if (todayNames.length < 2) return {};
  var first = snapMap[todayNames[0]];
  var last  = snapMap[todayNames[todayNames.length - 1]];
  if (!first || !last) return {};
  var result = {};
  Object.keys(last).forEach(function (company) {
    var firstKeys = {};
    (first[company] || []).forEach(function (j) { firstKeys[jobKey(j)] = true; });
    (last[company] || []).forEach(function (j) {
      if (!firstKeys[jobKey(j)]) result[company + '\x00' + jobKey(j)] = true;
    });
  });
  return result;
}

function scrapeRegressions(snapMap, byDate, diffDates) {
  if (diffDates.length < 2) return [];
  var latest = snapMap[byDate[diffDates[diffDates.length - 1]]];
  var prev   = snapMap[byDate[diffDates[diffDates.length - 2]]];
  if (!latest || !prev) return [];
  return Object.keys(latest)
    .filter(function (c) { return latest[c].length === 0 && (prev[c] || []).length > 0; })
    .sort();
}

function zeroResultPortals(snapMap, byDate, diffDates, portals) {
  if (!diffDates.length) return [];
  var latest = snapMap[byDate[diffDates[diffDates.length - 1]]];
  if (!latest) return [];
  var urlMap = {};
  portals.forEach(function (p) { urlMap[p.name] = p.url; });
  return Object.keys(latest)
    .filter(function (c) { return latest[c].length === 0; })
    .sort()
    .map(function (c) { return { name: c, url: urlMap[c] || '#' }; });
}

// ── HTML builders ──────────────────────────────────────────────────────────

function buildZeroResults(zeroes) {
  if (!zeroes.length) return '';
  return '<details class="zero-results">\n' +
    '      <summary><span class="zr-arrow">&#9658;</span> Sites returning 0 jobs (' +
    zeroes.length + ')</summary>\n' +
    '      <div class="zr-body"><ul class="zr-list">\n' +
    zeroes.map(function (z) {
      return '        <li><a href="' + esc(z.url) + '" target="_blank" rel="noopener">' +
        esc(z.name) + '</a></li>';
    }).join('\n') + '\n' +
    '      </ul></div>\n    </details>\n';
}

function buildWarning(regressions) {
  if (!regressions.length) return '';
  return '<div class="scrape-warning"><strong>Scraping may have failed:</strong> ' +
    regressions.map(esc).join(', ') +
    ' returned 0 jobs this run but had results last time.' +
    ' Your IP may be blocked — check these portals manually.</div>\n';
}

function buildDays(result, intraday) {
  if (!result.length) {
    return '<div class="empty"><h2>Baseline captured — no comparisons yet</h2>' +
      '<p>New jobs will appear here once a second day of snapshots has been collected.</p></div>\n';
  }
  return result.map(function (day) {
    var dt        = new Date(day.date + 'T12:00:00');
    var dateLabel = dt.toLocaleDateString('en-CA', { day: 'numeric', month: 'long', year: 'numeric' });
    var total     = Object.values(day.companies).reduce(function (s, j) { return s + j.length; }, 0);
    var pill      = day.date === TODAY ? '<span class="today-pill">today</span>' : '';

    var cards = Object.keys(day.companies).sort().map(function (company) {
      var jobs  = day.companies[company];
      var count = jobs.length + ' job' + (jobs.length !== 1 ? 's' : '');
      var items = jobs.map(function (job) {
        var pinId  = esc((company + '|' + job.title).toLowerCase());
        var isNew  = day.date === TODAY && intraday[company + '\x00' + jobKey(job)];
        var liCls  = isNew ? ' class="job-new"' : '';
        var titleH = job.url
          ? '<a href="' + esc(job.url) + '" target="_blank" rel="noopener" class="job-title">' + esc(job.title) + '</a>'
          : '<span class="job-title">' + esc(job.title) + '</span>';
        var locH   = job.location ? '<span class="job-loc">' + esc(job.location) + '</span>' : '';
        return '<li' + liCls +
          ' data-pin-id="' + pinId + '"' +
          ' data-title="' + esc(job.title) + '"' +
          ' data-url="' + esc(job.url || '') + '"' +
          ' data-company="' + esc(company) + '"' +
          ' data-date="' + day.date + '">' +
          titleH + '<span class="job-right">' + locH +
          '<button class="pin-btn" aria-pressed="false" aria-label="Pin this job">📌</button>' +
          '</span></li>';
      }).join('');
      return '<div class="company">' +
        '<div class="company-head">' +
        '<span class="company-name">' + esc(company) + '</span>' +
        '<span class="company-count">' + count + '</span></div>' +
        '<ul class="job-list">' + items + '</ul></div>';
    }).join('');

    return '<section class="day">' +
      '<div class="day-header">' +
      '<h2 class="day-name">' + dateLabel + '</h2>' + pill +
      '<span class="day-badge">' + total + ' new</span></div>' +
      '<div class="companies">' + cards + '</div></section>';
  }).join('');
}

// ── Render ─────────────────────────────────────────────────────────────────

function render(snapMap, plan, portals, totalSnaps) {
  var result      = dailyNew(snapMap, plan.byDate, plan.diffDates);
  var intraday    = intradayNew(snapMap, plan.todayNames);
  var regressions = scrapeRegressions(snapMap, plan.byDate, plan.diffDates);
  var zeroes      = zeroResultPortals(snapMap, plan.byDate, plan.diffDates, portals);

  console.log('[NJ] dailyNew: ' + result.length + ' day(s) with new jobs: ' +
    result.map(function (d) {
      var n = Object.values(d.companies).reduce(function (s, j) { return s + j.length; }, 0);
      return d.date + '(' + n + ' new, companies: ' + Object.keys(d.companies).join(', ') + ')';
    }).join(' | '));
  console.log('[NJ] intradayNew: ' + Object.keys(intraday).length + ' intraday-new job keys');
  console.log('[NJ] zeroResultPortals: ' + zeroes.map(function (z) { return z.name; }).join(', ') || '(none)');

  // Header timestamp
  if (plan.diffDates.length) {
    var lastName = plan.byDate[plan.diffDates[plan.diffDates.length - 1]];
    var m = lastName.match(/^(\d{4}-\d{2}-\d{2})_(\d{2})(\d{2})/);
    if (m) {
      var utc  = new Date(m[1] + 'T' + m[2] + ':' + m[3] + ':00Z');
      var opts = { day: 'numeric', month: 'long', year: 'numeric',
                   hour: '2-digit', minute: '2-digit',
                   timeZoneName: 'short', timeZone: 'America/Toronto' };
      document.getElementById('header-meta').textContent =
        'Last scraped: ' + utc.toLocaleString('en-CA', opts);
    }
  }

  document.getElementById('app').innerHTML =
    '<section id="pinned-section" style="display:none">' +
    '<div class="pinned-header">' +
    '<span class="pinned-title">📌 Pinned</span>' +
    '<span id="pinned-count" class="pinned-badge">0</span></div>' +
    '<div id="pinned-list"></div></section>' +
    buildZeroResults(zeroes) +
    '<div class="controls">' +
    '<select id="company-filter" class="filter-select"><option value="">All companies</option></select>' +
    '<button id="run-btn" class="run-btn">&#9654; Run Scraper</button></div>' +
    '<div id="progress-panel" class="progress-panel" style="display:none">' +
    '<div id="spinner" class="spinner"></div>' +
    '<span id="progress-text"></span></div>' +
    buildWarning(regressions) +
    buildDays(result, intraday);

  document.getElementById('footer').innerHTML =
    portals.length + ' companies tracked' +
    ' &nbsp;&middot;&nbsp; ' + totalSnaps + ' snapshot' + (totalSnaps !== 1 ? 's' : '') +
    '<br>Not checked: Terrestrial Energy, NPX Innovation, Framatome Canada' +
    ' — career pages use layouts that can\'t be scraped automatically';

  initFilter();
  initRunButton(portals.length);
  initPinning();
}

// ── Company filter ─────────────────────────────────────────────────────────

function initFilter() {
  var sel = document.getElementById('company-filter');
  if (!sel) return;
  var seen = {}, names = [];
  document.querySelectorAll('.company-name').forEach(function (el) {
    var n = el.textContent;
    if (!seen[n]) { seen[n] = true; names.push(n); }
  });
  names.sort().forEach(function (n) {
    var opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function () {
    var val = sel.value;
    document.querySelectorAll('.company').forEach(function (card) {
      card.style.display = (!val || card.querySelector('.company-name').textContent === val) ? '' : 'none';
    });
    document.querySelectorAll('.day').forEach(function (day) {
      day.style.display = Array.from(day.querySelectorAll('.company'))
        .some(function (c) { return c.style.display !== 'none'; }) ? '' : 'none';
    });
  });
}

// ── Run button ─────────────────────────────────────────────────────────────

function githubCtx() {
  var m = location.hostname.match(/^([^.]+)\.github\.io$/);
  if (!m) return null;
  var parts = location.pathname.replace(/^\//, '').split('/');
  return parts[0] ? { owner: m[1], repo: parts[0] } : null;
}

function initRunButton(portalCount) {
  var ctx           = githubCtx();
  var runBtn        = document.getElementById('run-btn');
  var progressPanel = document.getElementById('progress-panel');
  var progressText  = document.getElementById('progress-text');
  var spinner       = document.getElementById('spinner');

  if (!ctx) {
    runBtn.disabled = true;
    runBtn.title = 'Only works when viewed on GitHub Pages';
    runBtn.style.opacity = '0.45';
  }

  function setStatus(msg, spin) {
    progressText.textContent = msg;
    spinner.style.display = spin ? '' : 'none';
  }
  function sleep(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

  runBtn.addEventListener('click', function () {
    triggerScrape().catch(function (e) {
      setStatus('Error: ' + e.message, false);
      runBtn.disabled = !ctx;
    });
  });

  async function triggerScrape() {
    var pat = localStorage.getItem('nj_gh_pat');
    if (!pat) {
      pat = prompt('Enter a GitHub Personal Access Token with "workflow" scope.\n' +
        'Required to trigger the scrape workflow.\nSaved in this browser only.');
      if (pat && pat.trim()) localStorage.setItem('nj_gh_pat', pat.trim());
    }
    if (!pat || !pat.trim()) return;
    pat = pat.trim();

    runBtn.disabled = true;
    progressPanel.style.display = 'flex';
    setStatus('Triggering workflow…', true);

    var startTime = Date.now();
    var apiBase   = 'https://api.github.com/repos/' + ctx.owner + '/' + ctx.repo;
    var headers   = {
      'Authorization': 'Bearer ' + pat,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
    };

    var resp = await fetch(apiBase + '/actions/workflows/scrape.yml/dispatches', {
      method: 'POST', headers: headers, body: JSON.stringify({ ref: 'main' }),
    });
    if (resp.status === 401 || resp.status === 403) {
      localStorage.removeItem('nj_gh_pat');
      setStatus('PAT invalid or expired — try again.', false);
      runBtn.disabled = false; return;
    }
    if (!resp.ok) {
      setStatus('Could not trigger workflow (HTTP ' + resp.status + '). Check PAT scope.', false);
      runBtn.disabled = false; return;
    }

    var run = null, attempts = 0;
    setStatus('Workflow queued, waiting for it to start…', true);
    while (!run && attempts < 20) {
      await sleep(4000); attempts++;
      try {
        var r    = await fetch(apiBase + '/actions/runs?event=workflow_dispatch&per_page=5', { headers: headers });
        var data = await r.json();
        for (var i = 0; i < (data.workflow_runs || []).length; i++) {
          if (new Date(data.workflow_runs[i].created_at).getTime() >= startTime - 20000) {
            run = data.workflow_runs[i]; break;
          }
        }
      } catch (_) {}
    }
    if (!run) {
      setStatus('Could not locate the workflow run. Check the Actions tab on GitHub.', false);
      runBtn.disabled = false; return;
    }

    while (true) {
      var elapsed   = Math.round((Date.now() - startTime) / 1000);
      var estimated = Math.min(Math.floor(elapsed / 25), portalCount);
      if (run.status === 'completed') {
        if (run.conclusion === 'success') {
          setStatus('Done! Refreshing…', false);
          await sleep(1500); location.reload();
        } else {
          setStatus('Workflow ended: ' + run.conclusion + '. Check the Actions tab for details.', false);
          runBtn.disabled = false;
        }
        return;
      }
      setStatus(estimated + '/' + portalCount + ' employers checked (est.) — ' + elapsed + 's elapsed', true);
      await sleep(15000);
      try { var upd = await fetch(run.url, { headers: headers }); run = await upd.json(); } catch (_) {}
    }
  }
}

// ── Pinning ────────────────────────────────────────────────────────────────

function initPinning() {
  var LS_KEY = 'nj_pinned_v1';
  var cache  = [];

  function lsLoad() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch (_) { return []; }
  }
  function persist() { localStorage.setItem(LS_KEY, JSON.stringify(cache)); }

  function escP(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function fmtDate(s) {
    var p = s.split('-');
    if (p.length < 3) return s;
    var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return +p[2] + ' ' + (mon[+p[1] - 1] || '') + ' ' + p[0];
  }

  function renderPinned() {
    var section = document.getElementById('pinned-section');
    var list    = document.getElementById('pinned-list');
    var badge   = document.getElementById('pinned-count');
    if (!section) return;
    if (!cache.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    badge.textContent = cache.length;
    list.innerHTML = cache.map(function (p, i) {
      var t = p.url
        ? '<a href="' + escP(p.url) + '" target="_blank" rel="noopener" class="pinned-job-title">' + escP(p.title) + '</a>'
        : '<span class="pinned-job-title">' + escP(p.title) + '</span>';
      return '<div class="pinned-item" draggable="true" data-idx="' + i + '">' +
        '<span class="drag-handle" aria-hidden="true">⋮⋮</span>' +
        '<div class="pinned-info">' + t +
        '<div class="pinned-meta">' + escP(p.company) + ' &middot; ' + fmtDate(p.date) + '</div></div>' +
        '<button class="unpin-btn" data-idx="' + i + '" title="Unpin (applied)" aria-label="Unpin">\xD7</button>' +
        '</div>';
    }).join('');
    list.querySelectorAll('.unpin-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        cache.splice(+btn.dataset.idx, 1);
        renderPinned(); syncBtns(); persist();
      });
    });
    initDrag();
  }

  function syncBtns() {
    var set = {};
    cache.forEach(function (p) { set[p.id] = true; });
    document.querySelectorAll('li[data-pin-id]').forEach(function (li) {
      var btn = li.querySelector('.pin-btn');
      if (!btn) return;
      var pinned = !!set[li.dataset.pinId];
      btn.classList.toggle('is-pinned', pinned);
      btn.setAttribute('aria-pressed', String(pinned));
    });
  }

  function togglePin(li) {
    var id  = li.dataset.pinId;
    var idx = cache.findIndex(function (p) { return p.id === id; });
    if (idx >= 0) { cache.splice(idx, 1); }
    else {
      cache.push({ id: id, title: li.dataset.title, url: li.dataset.url || null,
                   company: li.dataset.company, date: li.dataset.date });
    }
    renderPinned(); syncBtns(); persist();
  }

  document.querySelectorAll('.pin-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var li = btn.closest('li[data-pin-id]');
      if (li) togglePin(li);
    });
  });

  function initDrag() {
    var list    = document.getElementById('pinned-list');
    var dragged = null;
    list.querySelectorAll('.pinned-item').forEach(function (item) {
      item.addEventListener('dragstart', function (e) {
        dragged = item; e.dataTransfer.effectAllowed = 'move';
        setTimeout(function () { item.classList.add('dragging'); }, 0);
      });
      item.addEventListener('dragend', function () {
        item.classList.remove('dragging');
        list.querySelectorAll('.pinned-item').forEach(function (i) { i.classList.remove('drag-over'); });
        dragged = null;
      });
      item.addEventListener('dragover', function (e) {
        e.preventDefault();
        if (item !== dragged) {
          list.querySelectorAll('.pinned-item').forEach(function (i) { i.classList.remove('drag-over'); });
          item.classList.add('drag-over');
        }
      });
      item.addEventListener('dragleave', function () { item.classList.remove('drag-over'); });
      item.addEventListener('drop', function (e) {
        e.preventDefault();
        if (!dragged || item === dragged) return;
        cache.splice(+item.dataset.idx, 0, cache.splice(+dragged.dataset.idx, 1)[0]);
        renderPinned(); syncBtns(); persist();
      });
    });
  }

  cache = lsLoad();
  syncBtns();
  renderPinned();
}

// ── Bootstrap ──────────────────────────────────────────────────────────────

async function bootstrap() {
  try {
    var index = await fetch('snapshots/index.json').then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching snapshots/index.json');
      return r.json();
    });

    var allNames   = index.snapshots || [];
    var portals    = index.portals   || [];
    var totalSnaps = allNames.length;

    console.log('[NJ] index.json: ' + totalSnaps + ' snapshots, last 3: ' + allNames.slice(-3).join(', '));

    if (!allNames.length) {
      document.getElementById('app').innerHTML =
        '<div class="empty"><h2>No snapshots yet</h2>' +
        '<p>Run the scraper to collect the first snapshot.</p></div>';
      return;
    }

    var plan  = planFetches(allNames);
    console.log('[NJ] planFetches: fetching ' + plan.names.length + ' snapshots, diffDates=' + JSON.stringify(plan.diffDates) + ', todayNames=' + JSON.stringify(plan.todayNames));

    var snaps = await Promise.all(plan.names.map(function (name) {
      return fetch('snapshots/' + name)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var count = Object.values(data).reduce(function (s, a) { return s + (a ? a.length : 0); }, 0);
          console.log('[NJ] snapshot ' + name + ': ' + Object.keys(data).length + ' portals, ' + count + ' total jobs');
          return { name: name, data: data };
        });
    }));

    var snapMap = {};
    snaps.forEach(function (s) { snapMap[s.name] = s.data; });

    render(snapMap, plan, portals, totalSnaps);

  } catch (err) {
    document.getElementById('app').innerHTML =
      '<div class="empty">' +
      '<h2>Could not load snapshot data</h2>' +
      '<p>' + esc(err.message) + '</p>' +
      '<p style="margin-top:10px;font-size:.82rem;color:#94a3b8">' +
      'This page requires a web server (GitHub Pages or <code>python -m http.server</code>).<br>' +
      'For a self-contained local file, run ' +
      '<code>python tracker.py dashboard</code> instead.' +
      '</p></div>';
    document.getElementById('header-meta').textContent = 'Error loading data';
  }
}

bootstrap();

})();
</script>
