name: Scrape Jobs

on:
  schedule:
    - cron: '0 23 * * *'  # 7pm EDT
  workflow_dispatch:  # manual trigger from the GitHub Actions tab or the dashboard Run button
  # updated: 2026-05-11

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the snapshot + dashboard back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python tracker.py scrape

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "scrape: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
